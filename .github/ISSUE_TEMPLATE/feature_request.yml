name: Feature request
description: Suggest a focused performance or usability improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What browser-side problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks or tradeoffs
      description: Could this hide legitimate content, add permissions, or increase maintenance cost?
